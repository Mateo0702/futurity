<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Futurity - Acceso al Sistema</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="login-page">

    <div class="login-glass-card">

        <div class="login-header">
            <div class="login-logo-circle" style="background: transparent; border: none; padding: 0;">
                <img src="{{ url_for('static', filename='img/logo_futurity.png') }}" alt="Futurity Logo" style="width: 100%; height: 100%; object-fit: contain; border-radius: 12px;">
            </div>
            <h1>Futurity</h1>
            <p>Portal de Operaciones y Ruteo</p>
        </div>

        <div>
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="login-alert login-alert-{{ category }}">
                {{ message }}
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form action="{{ url_for('login') }}" method="POST">
                <div class="login-form-group">
                    <label for="email">Correo Corporativo</label>
                    <input type="email" id="email" name="email" required placeholder="ejemplo@futurity.com"
                        autocomplete="email" class="login-input" autocapitalize="none" autocorrect="off" spellcheck="false">
                </div>

                <div class="login-form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" required placeholder="••••••••"
                            class="login-input" style="padding-right: 40px;" autocapitalize="none" autocorrect="off" spellcheck="false">
                        <button type="button" id="togglePassword" class="toggle-password-btn" aria-label="Mostrar contraseña" title="Mostrar/Ocultar contraseña">
                            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>

                <button type="submit" class="login-btn">
                    Ingresar al Sistema
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>

        <div style="text-align: center; margin-top: 25px; padding-top: 15px; border-top: 1px solid #e2e8f0; font-size: 0.72rem; color: #94a3b8; font-weight: 500;">
            Futurity Portal • Versión v{{ app_version }}
        </div>

    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            // Alternar el tipo del input
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            // Alternar el ícono (ojo abierto / ojo cerrado)
            if (type === 'text') {
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });
    </script>

</body>

</html>
