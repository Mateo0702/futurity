<div id="tab-mapa-tecnicos" class="tab-content {% if active_tab == 'mapa-tecnicos' %}active{% endif %}">
    <div class="hero-card" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
            <div>
                <h1 style="margin: 0; font-size: 2.2rem;"><i class="fa-solid fa-map-location-dot"></i> Monitoreo en Vivo</h1>
                <p style="margin-top: 5px; opacity: 0.9; max-width: 600px;">
                    Ubicación y estado de los técnicos reportado en tiempo real desde la aplicación de campo.
                </p>
            </div>
            <button onclick="cargarUbicacionesTecnicos()" class="btn" style="background-color: #0f172a; color: white; display: flex; align-items: center; gap: 8px; box-shadow: none; border-radius: 12px; padding: 10px 20px;">
                <i class="fa-solid fa-arrows-rotate"></i> Actualizar Ubicaciones
            </button>
        </div>
    </div>

    <div style="display: grid; grid-template-columns: 320px 1fr; gap: 20px; height: calc(100vh - 240px); min-height: 520px; margin-bottom: 20px;">
        
        <!-- Panel Izquierdo: Lista de Técnicos -->
        <div class="card" style="padding: 20px; margin-bottom: 0; display: flex; flex-direction: column; overflow: hidden; border: 1px solid var(--border-color);">
            <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 1.1rem; color: var(--text-main); display: flex; justify-content: space-between; align-items: center;">
                <span>Equipo Técnico</span>
                <span id="contador-tecnicos" style="background-color: #e2e8f0; color: #475569; padding: 2px 8px; border-radius: 12px; font-size: 0.8rem; font-weight: bold;">0</span>
            </h3>
            
            <div id="lista-tecnicos-mapa" style="display: flex; flex-direction: column; gap: 12px; overflow-y: auto; flex-grow: 1; padding-right: 5px;">
                <div style="text-align: center; color: #64748b; margin-top: 50px;">
                    <i class="fa-solid fa-spinner fa-spin" style="font-size: 1.5rem; margin-bottom: 10px;"></i>
                    <p style="font-size: 0.9rem;">Cargando ubicaciones...</p>
                </div>
            </div>
        </div>

        <!-- Panel Derecho: El Mapa -->
        <div class="card" style="padding: 0; margin-bottom: 0; position: relative; overflow: hidden; border: 1px solid var(--border-color);">
            <!-- Indicadores KPI flotantes sobre el mapa -->
            <div class="kpis-flotantes-container" style="position: absolute; top: 15px; left: 15px; z-index: 1000; display: flex; gap: 10px; flex-wrap: wrap; pointer-events: none;">
                <div class="kpi-flotante-card" style="background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; pointer-events: auto; transition: all 0.2s;">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #10b981;"></div>
                    <span style="font-size: 0.75rem; color: #475569; font-weight: 600;">Activos: <strong id="kpi-tec-activos" style="color: #0f172a; font-size: 0.85rem;">0</strong></span>
                </div>
                <div class="kpi-flotante-card" style="background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; pointer-events: auto; transition: all 0.2s;">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #94a3b8;"></div>
                    <span style="font-size: 0.75rem; color: #475569; font-weight: 600;">Inactivos: <strong id="kpi-tec-inactivos" style="color: #0f172a; font-size: 0.85rem;">0</strong></span>
                </div>
                <div class="kpi-flotante-card" style="background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; pointer-events: auto; transition: all 0.2s;">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #3b82f6;"></div>
                    <span style="font-size: 0.75rem; color: #475569; font-weight: 600;">Libres: <strong id="kpi-tec-libres" style="color: #0f172a; font-size: 0.85rem;">0</strong></span>
                </div>
                <div class="kpi-flotante-card" style="background: white; border: 1px solid #cbd5e1; border-radius: 12px; padding: 8px 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); display: flex; align-items: center; gap: 8px; font-family: 'Inter', sans-serif; pointer-events: auto; transition: all 0.2s;">
                    <div style="width: 8px; height: 8px; border-radius: 50%; background-color: #ef4444;"></div>
                    <span style="font-size: 0.75rem; color: #475569; font-weight: 600;">Ocupados: <strong id="kpi-tec-ocupados" style="color: #0f172a; font-size: 0.85rem;">0</strong></span>
                </div>
            </div>
            <div id="mapa-tecnicos-live" style="width: 100%; height: 100%; z-index: 1;"></div>
        </div>

    </div>
</div>

<style>
    .tooltip-tecnico {
        background-color: #0f172a !important;
        color: white !important;
        border: none !important;
        border-radius: 6px !important;
        font-weight: 600 !important;
        font-size: 0.75rem !important;
        padding: 3px 8px !important;
        box-shadow: 0 4px 6px rgba(0,0,0,0.15) !important;
    }
    .tooltip-tecnico::before {
        border-top-color: #0f172a !important;
    }
    .item-tecnico-lista:hover {
        background-color: #f1f5f9 !important;
        border-color: #cbd5e1 !important;
        transform: translateY(-1px);
    }
    /* Estilos adaptados al modo oscuro si aplica */
    body.dark-mode .item-tecnico-lista {
        background-color: #1e293b !important;
        border-color: #334155 !important;
    }
    body.dark-mode .item-tecnico-lista:hover {
        background-color: #334155 !important;
    }

    /* Estilos flotantes de KPI */
    body.dark-mode .kpi-flotante-card {
        background-color: #1e293b !important;
        border-color: #334155 !important;
        box-shadow: none !important;
    }
    body.dark-mode .kpi-flotante-card span {
        color: #94a3b8 !important;
    }
    body.dark-mode .kpi-flotante-card strong {
        color: #f8fafc !important;
    }

    /* Estilo para técnicos desconectados */
    .item-tecnico-lista.desconectado {
        background-color: #f1f5f9 !important;
        border-color: #e2e8f0 !important;
        opacity: 0.6;
    }
    body.dark-mode .item-tecnico-lista.desconectado {
        background-color: #0f172a !important;
        border-color: #1e293b !important;
    }
    body.dark-mode .tooltip-tecnico {
        background-color: #dc2626 !important;
    }
    @keyframes pulse-red {
        0% {
            stroke-width: 2;
            fill-opacity: 0.4;
            stroke-opacity: 0.8;
        }
        50% {
            stroke-width: 8;
            fill-opacity: 0.15;
            stroke-opacity: 0.3;
        }
        100% {
            stroke-width: 2;
            fill-opacity: 0.4;
            stroke-opacity: 0.8;
        }
    }
    @keyframes sidebar-panic-pulse {
        0% {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
        50% {
            box-shadow: 0 0 0 6px rgba(239, 68, 68, 0);
            border-color: #fca5a5;
        }
        100% {
            box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4);
            border-color: #ef4444;
        }
    }
    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(100px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }
    .pulso-emergencia-mapa {
        animation: pulse-red 2s infinite ease-in-out;
    }
    .item-tecnico-lista.panico {
        animation: sidebar-panic-pulse 2s infinite;
        background-color: #fef2f2 !important;
        border-color: #fca5a5 !important;
    }
    body.dark-mode .item-tecnico-lista.panico {
        background-color: #7f1d1d !important;
        border-color: #b91c1c !important;
    }
</style>

<script>
    let mapaTecnicos;
    let marcadoresTecnicos = {};
    let circulosEmergencia = {};
    let tecnicosEnPanico = new Set();

    function reproducirSonidoAlerta() {
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.3);
            osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 0.6);
            osc.frequency.linearRampToValueAtTime(1200, audioCtx.currentTime + 0.9);
            osc.frequency.linearRampToValueAtTime(880, audioCtx.currentTime + 1.2);
            
            gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        } catch (e) {
            console.warn("No se pudo reproducir el sonido de alerta (requiere interacción previa):", e);
        }
    }

    function mostrarToastAlerta(tecnico, motivo) {
        let container = document.getElementById('toast-emergency-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-emergency-container';
            container.style.position = 'fixed';
            container.style.top = '20px';
            container.style.right = '20px';
            container.style.zIndex = '99999';
            container.style.display = 'flex';
            container.style.flexDirection = 'column';
            container.style.gap = '10px';
            document.body.appendChild(container);
        }

        const toast = document.createElement('div');
        toast.className = 'toast-emergencia-premium';
        toast.style.background = 'linear-gradient(135deg, #dc2626 0%, #991b1b 100%)';
        toast.style.color = 'white';
        toast.style.padding = '16px 24px';
        toast.style.borderRadius = '16px';
        toast.style.boxShadow = '0 10px 25px rgba(220, 38, 38, 0.4)';
        toast.style.border = '1px solid #ef4444';
        toast.style.display = 'flex';
        toast.style.alignItems = 'center';
        toast.style.gap = '15px';
        toast.style.minWidth = '300px';
        toast.style.maxWidth = '400px';
        toast.style.animation = 'fadeInRight 0.3s ease';
        
        toast.innerHTML = `
            <div style="font-size: 1.8rem; flex-shrink: 0;"><i class="fa-solid fa-triangle-exclamation fa-beat"></i></div>
            <div style="flex-grow: 1;">
                <h4 style="margin: 0; font-size: 1rem; font-weight: 800; letter-spacing: -0.02em;">¡ALERTA DE EMERGENCIA!</h4>
                <p style="margin: 3px 0 0 0; font-size: 0.85rem; opacity: 0.9;"><strong>${tecnico}</strong> solicita apoyo:<br><em>"${motivo}"</em></p>
            </div>
            <button onclick="this.parentElement.remove()" style="background: none; border: none; color: white; opacity: 0.7; font-size: 1.2rem; cursor: pointer; padding: 0; line-height: 1;">&times;</button>
        `;

        container.appendChild(toast);
        
        setTimeout(() => {
            if (toast && toast.parentElement) {
                toast.remove();
            }
        }, 10000);
    }

    function inicializarMapaTecnicos() {
        if (mapaTecnicos) return; // Si ya fue inicializado, salir

        // Centrado en Cuenca, Ecuador por defecto
        mapaTecnicos = L.map('mapa-tecnicos-live').setView([-2.9001, -79.0059], 13);

        // Capa de mapas limpia y moderna
        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; OpenStreetMap contributors'
        }).addTo(mapaTecnicos);

        cargarUbicacionesTecnicos();

        // Bucle de auto-actualización cada 10 segundos
        setInterval(() => {
            const tab = document.getElementById('tab-mapa-tecnicos');
            if (tab && tab.classList.contains('active')) {
                cargarUbicacionesTecnicos();
            }
        }, 10000);
    }

    function cargarUbicacionesTecnicos() {
        fetch('/api/admin/tecnicos/ubicaciones')
            .then(res => res.json())
            .then(data => {
                if (data.status === 'ok') {
                    actualizarMapaYLista(data.ubicaciones);
                } else {
                    console.error("Error backend: ", data.message);
                }
            })
            .catch(err => console.error("Error al cargar ubicaciones: ", err));
    }

    function actualizarMapaYLista(ubicaciones) {
        const listaContainer = document.getElementById('lista-tecnicos-mapa');
        const contadorEl = document.getElementById('contador-tecnicos');

        // Calcular conteos de KPI
        let conectadosCount = 0;
        let desconectadosCount = 0;
        let libresCount = 0;
        let ocupadosCount = 0;

        ubicaciones.forEach(u => {
            if (u.conectado === 1) {
                conectadosCount++;
                if (u.estado.includes('Trabajando') || u.estado.includes('En camino')) {
                    ocupadosCount++;
                } else if (u.estado === 'Disponible' || u.estado === 'Sesión Iniciada') {
                    libresCount++;
                }
            } else if (u.conectado === 2) {
                desconectadosCount++;
                if (u.estado.includes('Trabajando') || u.estado.includes('En camino')) {
                    ocupadosCount++;
                } else if (u.estado === 'Disponible' || u.estado === 'Sesión Iniciada') {
                    libresCount++;
                }
            } else {
                desconectadosCount++;
            }
        });

        // Actualizar tarjetas de KPI
        document.getElementById('kpi-tec-activos').innerText = conectadosCount;
        document.getElementById('kpi-tec-inactivos').innerText = desconectadosCount;
        document.getElementById('kpi-tec-libres').innerText = libresCount;
        document.getElementById('kpi-tec-ocupados').innerText = ocupadosCount;

        listaContainer.innerHTML = '';
        contadorEl.innerText = ubicaciones.length;

        if (ubicaciones.length === 0) {
            listaContainer.innerHTML = `
                <div style="text-align: center; color: #64748b; margin-top: 50px;">
                    <p style="font-size: 0.9rem; font-style: italic;">No hay técnicos registrados en este área.</p>
                </div>
            `;
            // Limpiar todos los marcadores y círculos del mapa
            for (const key in marcadoresTecnicos) {
                mapaTecnicos.removeLayer(marcadoresTecnicos[key]);
                delete marcadoresTecnicos[key];
            }
            for (const key in circulosEmergencia) {
                mapaTecnicos.removeLayer(circulosEmergencia[key]);
                delete circulosEmergencia[key];
            }
            tecnicosEnPanico.clear();
            return;
        }

        // Iconos de Leaflet adaptados a los estados
        const iconoEnRuta = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3065/3065532.png', // Camioneta
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });

        const iconoEnProgreso = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/2942/2942503.png', // Herramienta
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });

        const iconoOffline = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/3204/3204905.png', // Furgoneta normal/gris
            iconSize: [36, 36],
            iconAnchor: [18, 18]
        });

        const iconoPanico = L.icon({
            iconUrl: 'https://cdn-icons-png.flaticon.com/512/564/564619.png', // Sirena
            iconSize: [40, 40],
            iconAnchor: [20, 20]
        });

        const nombresActivos = [];
        const nombresPanicoActuales = [];

        ubicaciones.forEach(u => {
            const key = u.tecnico;
            const perfilUrl = `/static/uploads/${u.foto_perfil || 'default_avatar.png'}`;
            const vehiculoUrl = `/static/uploads/${u.foto_vehiculo || 'furgoneta_milton.jpeg'}`;
            const placa = u.placa_vehiculo || 'S/P';

            // Configurar variables de visualización
            let estadoClaseColor = '#94a3b8'; // gris (desconectado)
            let estadoTexto = 'DESCONECTADO';
            let tiempoTexto = 'Desconectado';
            
            if (u.ultima_actualizacion) {
                const fechaAct = new Date(u.ultima_actualizacion);
                const difSegs = Math.floor((new Date() - fechaAct) / 1000);
                if (difSegs > 3600) {
                    tiempoTexto = `Hace ${Math.floor(difSegs / 3600)}h`;
                } else if (difSegs > 60) {
                    tiempoTexto = `Hace ${Math.floor(difSegs / 60)}m`;
                } else if (difSegs > 0) {
                    tiempoTexto = `Hace ${difSegs}s`;
                }
            }

            // Si está conectado o con baja cobertura, renderizar marcador en el mapa
            if (u.conectado === 1 || u.conectado === 2) {
                nombresActivos.push(key);
                const latLng = [u.lat, u.lon];
                let icono = iconoOffline;
                let opacityVal = u.conectado === 2 ? 0.6 : 1.0;

                if (u.alerta_panico) {
                    icono = iconoPanico;
                    estadoClaseColor = '#ef4444';
                    estadoTexto = '🚨 EMERGENCIA: ' + (u.mensaje_panico || 'Auxilio');
                    
                    nombresPanicoActuales.push(key);
                    if (!tecnicosEnPanico.has(key)) {
                        tecnicosEnPanico.add(key);
                        reproducirSonidoAlerta();
                        mostrarToastAlerta(key, u.mensaje_panico || 'Auxilio solicitado');
                    }
                } else if (u.conectado === 2) {
                    estadoClaseColor = '#64748b';
                    estadoTexto = '⚠️ SIN SEÑAL / BAJA COB.';
                } else if (u.estado.includes('En camino')) {
                    icono = iconoEnRuta;
                    estadoClaseColor = '#f59e0b';
                    estadoTexto = u.estado;
                } else if (u.estado.includes('Trabajando')) {
                    icono = iconoEnProgreso;
                    estadoClaseColor = '#ef4444';
                    estadoTexto = u.estado;
                } else if (u.estado === 'En Descanso') {
                    icono = iconoOffline;
                    estadoClaseColor = '#ea580c';
                    estadoTexto = u.estado;
                } else if (u.estado === 'Sesión Iniciada' || u.estado === 'Disponible') {
                    icono = iconoOffline;
                    estadoClaseColor = '#10b981';
                    estadoTexto = u.estado;
                } else {
                    estadoTexto = u.estado;
                }
                
                // Círculo de pánico
                if (u.alerta_panico) {
                    if (circulosEmergencia[key]) {
                        circulosEmergencia[key].setLatLng(latLng);
                    } else {
                        const circle = L.circle(latLng, {
                            color: '#ef4444',
                            fillColor: '#ef4444',
                            fillOpacity: 0.4,
                            radius: 80,
                            className: 'pulso-emergencia-mapa'
                        }).addTo(mapaTecnicos);
                        circulosEmergencia[key] = circle;
                    }
                } else {
                    if (circulosEmergencia[key]) {
                        mapaTecnicos.removeLayer(circulosEmergencia[key]);
                        delete circulosEmergencia[key];
                    }
                }

                // Crear o mover marcador en el mapa
                if (marcadoresTecnicos[key]) {
                    marcadoresTecnicos[key].setLatLng(latLng);
                    marcadoresTecnicos[key].setIcon(icono);
                    marcadoresTecnicos[key].setOpacity(opacityVal);
                } else {
                    const marker = L.marker(latLng, { icon: icono, opacity: opacityVal }).addTo(mapaTecnicos);
                    marker.bindTooltip(key, { permanent: true, direction: 'top', className: 'tooltip-tecnico' });
                    marcadoresTecnicos[key] = marker;
                }

                let popupAlertaPanico = '';
                if (u.alerta_panico) {
                    popupAlertaPanico = `
                        <div style="background-color: #fee2e2; border: 1px solid #fca5a5; padding: 8px; border-radius: 8px; margin-bottom: 8px; color: #b91c1c; font-weight: bold; text-align: center; font-size: 0.8rem; line-height: 1.3;">
                            🚨 EMERGENCIA EN RUTA:<br>
                            "${u.mensaje_panico || 'Auxilio solicitado'}"
                        </div>
                    `;
                }

                const popupHtml = `
                    <div style="font-family: 'Inter', sans-serif; padding: 5px; width: 220px; display: flex; flex-direction: column; gap: 8px;">
                        ${popupAlertaPanico}
                        <div style="display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #e2e8f0; padding-bottom: 8px;">
                            <img src="${perfilUrl}" alt="${key}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 1.5px solid #cbd5e1;">
                            <div>
                                <h4 style="margin: 0; color: #0f172a; font-size: 0.95rem; font-weight: 800;">${key}</h4>
                                <span style="background-color: ${estadoClaseColor}; color: white; padding: 2px 6px; font-size: 0.65rem; font-weight: bold; border-radius: 4px; text-transform: uppercase; display: inline-block; margin-top: 2px;">
                                    ${estadoTexto}
                                </span>
                            </div>
                        </div>
                        <div style="font-size: 0.8rem; color: #475569; display: flex; flex-direction: column; gap: 3px;">
                            <div><i class="fa-solid fa-truck" style="color: #94a3b8; width: 16px;"></i> Placa: <strong>${placa}</strong></div>
                            <div style="text-align: center; margin: 5px 0;">
                                <img src="${vehiculoUrl}" alt="Furgoneta" style="width: 100%; height: 80px; border-radius: 6px; object-fit: cover; border: 1px solid #e2e8f0;">
                            </div>
                            <div style="font-size: 0.7rem; color: #94a3b8; border-top: 1px solid #e2e8f0; padding-top: 4px; display: flex; justify-content: space-between; align-items: center;">
                                <span>Actualizado:</span>
                                <strong>${tiempoTexto}</strong>
                            </div>
                        </div>
                    </div>
                `;
                marcadoresTecnicos[key].bindPopup(popupHtml);
            }

            // HTML de listado
            const itemClasePanico = u.alerta_panico ? 'panico' : '';
            const itemClaseConexion = u.conectado === 0 ? 'desconectado' : (u.conectado === 2 ? 'sin-senal' : '');
            let clickHandlerHtml = `onclick="enfocarTecnico('${key}', ${u.lat}, ${u.lon})"`;
            let centrarBtnHtml = `<span style="color: #2563eb; font-weight: 700; font-size: 0.7rem;"><i class="fa-solid fa-location-crosshairs"></i> Centrar</span>`;
            
            if (u.conectado === 0) {
                clickHandlerHtml = '';
                centrarBtnHtml = `<span style="color: #94a3b8; font-weight: 700; font-size: 0.7rem;"><i class="fa-solid fa-circle-notch"></i> Offline</span>`;
            } else if (u.conectado === 2) {
                centrarBtnHtml = `<span style="color: #64748b; font-weight: 700; font-size: 0.7rem;"><i class="fa-solid fa-location-crosshairs"></i> Última Ubic.</span>`;
            }

            const itemHtml = `
                <div ${clickHandlerHtml} class="item-tecnico-lista ${itemClasePanico} ${itemClaseConexion}" style="background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 12px; cursor: ${u.conectado === 0 ? 'not-allowed' : 'pointer'}; transition: all 0.2s ease; display: flex; align-items: center; gap: 12px; ${u.conectado === 0 ? 'opacity: 0.55;' : (u.conectado === 2 ? 'opacity: 0.85;' : '')}">
                    <img src="${perfilUrl}" alt="${key}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover; border: 1.5px solid #e2e8f0; flex-shrink: 0; ${u.conectado === 0 ? 'filter: grayscale(1);' : (u.conectado === 2 ? 'filter: grayscale(0.3);' : '')}">
                    <div style="flex-grow: 1; min-width: 0; display: flex; flex-direction: column; gap: 3px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; gap: 5px;">
                            <strong style="color: var(--text-main); font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 130px;">${key}</strong>
                            <span style="background-color: ${estadoClaseColor}; color: white; font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; text-transform: uppercase; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 80px;" title="${estadoTexto}">${estadoTexto}</span>
                        </div>
                        <div style="font-size: 0.75rem; color: #64748b; display: flex; justify-content: space-between; align-items: center;">
                            <span><i class="fa-regular fa-clock" style="width: 13px; color: #94a3b8;"></i> ${tiempoTexto}</span>
                            ${centrarBtnHtml}
                        </div>
                    </div>
                </div>
            `;
            listaContainer.innerHTML += itemHtml;
        });

        // Eliminar del mapa los marcadores de técnicos inactivos
        for (const key in marcadoresTecnicos) {
            if (!nombresActivos.includes(key)) {
                mapaTecnicos.removeLayer(marcadoresTecnicos[key]);
                delete marcadoresTecnicos[key];
                
                if (circulosEmergencia[key]) {
                    mapaTecnicos.removeLayer(circulosEmergencia[key]);
                    delete circulosEmergencia[key];
                }
            }
        }

        // Limpiar técnicos que ya no tienen alerta de pánico
        tecnicosEnPanico.forEach(key => {
            if (!nombresPanicoActuales.includes(key)) {
                tecnicosEnPanico.delete(key);
            }
        });
    }

    function enfocarTecnico(key, lat, lon) {
        if (mapaTecnicos && marcadoresTecnicos[key]) {
            mapaTecnicos.setView([lat, lon], 16);
            marcadoresTecnicos[key].openPopup();
        }
    }
</script>
