<div id="tab-registro" class="tab-content {% if active_tab == 'registro' %}active{% endif %}">
    <h2>Registrar Nueva Visita</h2>
    <div class="card">
        <form action="/api/visitas" method="POST">

            <h3 style="margin-bottom: 15px; color: var(--primary); font-size: 1.1rem;">Datos de Asignación</h3>
            <div class="form-grid">

                <div class="form-group">
                    <label>Fecha Programada (Día de la Visita):</label>
                    <input type="date" name="fecha_programada" id="fecha_programada" required class="form-control">
                    <script>
                        // Obtener la fecha local exacta del equipo del usuario
                        const fechaLocal = new Date();
                        
                        const anio = fechaLocal.getFullYear();
                        // Los meses en JavaScript empiezan en 0, por eso sumamos 1. 
                        // padStart asegura que el mes y día siempre tengan 2 dígitos (ej. "05" en lugar de "5")
                        const mes = String(fechaLocal.getMonth() + 1).padStart(2, '0');
                        const dia = String(fechaLocal.getDate()).padStart(2, '0');

                        // Armar el formato YYYY-MM-DD y aplicarlo como mínimo
                        document.getElementById('fecha_programada').min = `${anio}-${mes}-${dia}`;
                    </script>
                </div>

                <div class="form-group">
                    <label>Prioridad de Atención:</label>
                    <select name="prioridad" class="form-control" required>
                        <option value="ALTA">🔴 ALTA</option>
                        <option value="MEDIA" selected>🟡 MEDIA</option>
                        <option value="BAJA">⚪ BAJA</option>
                    </select>
                </div>

                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                        <label style="margin: 0; font-weight: 700; color: #475569; font-size: 0.85rem;">Técnico Principal:</label>
                        <button type="button" onclick="recomendarTecnicoCercano()" 
                            style="background-color: #f8fafc; border: 1px solid #cbd5e1; color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <i class="fa-solid fa-location-crosshairs"></i> Recomendar Cercano
                        </button>
                    </div>
                    <select name="tecnico_asignado" id="registro-tecnico-asignado" class="form-control" required>
                        <option value="">-- Seleccione el Técnico Responsable --</option>
                        {% for tecnico in tecnicos %}
                        <option value="{{ tecnico.nombre }}">{{ tecnico.nombre }}</option>
                        {% endfor %}
                    </select>
                    <!-- Contenedor dinámico de recomendaciones de técnicos cercanos -->
                    <div id="contenedor-recomendaciones-tecnicos" style="display: none; margin-top: 8px; padding: 10px; background-color: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; font-size: 0.85rem; color: #166534; box-shadow: var(--shadow-sm);">
                        <strong>📍 Recomendaciones de Soporte Cercano:</strong>
                        <ul id="lista-recomendaciones-tecnicos" style="margin: 5px 0 0 0; padding-left: 20px; list-style-type: disc; display: flex; flex-direction: column; gap: 4px;">
                            <!-- Dinámico -->
                        </ul>
                    </div>
                </div>

                <div class="form-group">
                    <label>Técnico de Apoyo (Opcional):</label>
                    <select name="tecnico_apoyo" class="form-control">
                        <option value="">-- Sin Apoyo --</option>
                        {% for tecnico in tecnicos %}
                        <option value="{{ tecnico.nombre }}">{{ tecnico.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <h3 style="margin-top: 25px; margin-bottom: 15px; color: var(--primary); font-size: 1.1rem;">Datos del
                Cliente</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Empresa:</label>
                    <select name="empresa" required class="form-control">
                        <option value="SERVICABLE">SERVICABLE</option>
                        <option value="FIBRACOM">FIBRACOM</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Contrato:</label>
                    <input type="text" name="contrato" placeholder="Ej. 47d" class="form-control">
                </div>
                <div class="form-group">
                    <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px;">
                        <label style="margin: 0;">Nombre del Cliente:</label>
                        <button type="button" onclick="cargarHistorial(document.getElementById('input-cliente-registro').value)" 
                            style="background-color: #f8fafc; border: 1px solid #cbd5e1; color: var(--primary); padding: 4px 8px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px;">
                            <i class="fa-solid fa-clock-rotate-left"></i> Ver Historial
                        </button>
                    </div>
                    <input type="text" name="cliente" id="input-cliente-registro" required placeholder="Ej. SUQUISUPA IÑAGUAZA..."
                        class="form-control">
                </div>
                <div class="form-group">
                    <label>Teléfonos:</label>
                    <input type="text" name="telefonos" placeholder="Ej. 593 99 232 1716" class="form-control">
                </div>
            </div>

            <h3 style="margin-top: 25px; margin-bottom: 15px; color: var(--primary); font-size: 1.1rem;">Ubicación</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Sector:</label>
                    <select name="sector" id="registro-sector" required class="form-control" onchange="autoCompletarCoordenadasSector(this)">
                        <option value="">-- Seleccionar Sector --</option>
                        {% for sector in sectores %}
                        <option value="{{ sector.nombre_sector }}" data-lat="{{ sector.latitud_defecto }}" data-lon="{{ sector.longitud_defecto }}">{{ sector.nombre_sector }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Dirección Exacta:</label>
                    <input type="text" name="direccion" required placeholder="Calle sin nombre, referencias..."
                        class="form-control">
                </div>
                <div class="form-group">
                    <label>Latitud (Opcional):</label>
                    <input type="text" name="latitud" id="registro-latitud" placeholder="-2.897..." class="form-control">
                </div>
                <div class="form-group">
                    <label>Longitud (Opcional):</label>
                    <input type="text" name="longitud" id="registro-longitud" placeholder="-78.998..." class="form-control">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Preferencia Horaria (Cliente):</label>
                    <input type="text" name="preferencia_horaria" placeholder="Ej. tarde, mañana, 8:30" required
                        class="form-control">
                </div>
            </div>

            <h3 style="margin-top: 25px; margin-bottom: 15px; color: var(--primary); font-size: 1.1rem;">Detalles
                Técnicos</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label>Servicio:</label>
                    <select name="servicio" required class="form-control">
                        <option value="">-- Seleccionar --</option>
                        <option value="INTERNET_GPON">INTERNET_GPON</option>
                        <option value="COMBO_GPON">COMBO_GPON</option>
                        <option value="CABLE_GPON">CABLE_GPON</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Velocidad Mbps:</label>
                    <input type="number" name="velocidad_mbps" placeholder="Ej. 500" class="form-control">
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Problema Reportado:</label>
                    <select name="problema" required class="form-control">
                        <option value="">-- Seleccionar Problema --</option>
                        {% for prob in problemas %}
                        <option value="{{ prob.nombre }}">{{ prob.nombre }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <label>Observación Callcenter:</label>
                    <textarea name="observacion_callcenter" rows="2"
                        style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-color); font-family: inherit; font-size: 0.95rem; resize: vertical;"
                        placeholder="Cliente indica problemas en la señal..."></textarea>
                </div>
                <div class="form-group" style="grid-column: span 2;">
                    <h4 style="margin-bottom: 15px; color: #475569; font-size: 0.95rem; font-weight: 700;">Información de Conexión (Opcional):</h4>
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px;">
                        <div>
                            <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px; display: block;">CAJA:</label>
                            <input type="text" name="info_caja" class="form-control" placeholder="Ej. NAP-01">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px; display: block;">HILO:</label>
                            <input type="text" name="info_hilo" class="form-control" placeholder="Ej. 12">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px; display: block;">IP (Estática):</label>
                            <input type="text" name="info_ip" class="form-control" placeholder="192.168.x.x">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px; display: block;">Usuario (PPPoE):</label>
                            <input type="text" name="info_usr" class="form-control" placeholder="Usuario">
                        </div>
                        <div>
                            <label style="font-size: 0.8rem; color: #64748b; margin-bottom: 4px; display: block;">Clave (PPPoE):</label>
                            <input type="text" name="info_pas" class="form-control" placeholder="Contraseña">
                        </div>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn btn-block" style="margin-top: 20px;">Guardar Visita</button>
        </form>
    </div>
</div>

<script>
    function autoCompletarCoordenadasSector(select) {
        const selectedOption = select.options[select.selectedIndex];
        const lat = selectedOption.getAttribute('data-lat');
        const lon = selectedOption.getAttribute('data-lon');
        
        const inputLat = document.getElementById('registro-latitud');
        const inputLon = document.getElementById('registro-longitud');
        
        if (lat && lon) {
            inputLat.value = lat;
            inputLon.value = lon;
            console.log(`Coordenadas auto-completadas para el sector: ${lat}, ${lon}`);
            
            // Ocultar recomendaciones anteriores por si cambió el sector
            document.getElementById('contenedor-recomendaciones-tecnicos').style.display = 'none';
        } else {
            inputLat.value = '';
            inputLon.value = '';
        }
    }

    function recomendarTecnicoCercano() {
        const lat = document.getElementById('registro-latitud').value.trim();
        const lon = document.getElementById('registro-longitud').value.trim();
        
        if (!lat || !lon) {
            alert("Por favor, seleccione un sector o ingrese coordenadas de latitud/longitud primero.");
            return;
        }
        
        const contenedor = document.getElementById('contenedor-recomendaciones-tecnicos');
        const lista = document.getElementById('lista-recomendaciones-tecnicos');
        
        lista.innerHTML = '<li><i class="fa-solid fa-spinner fa-spin"></i> Buscando técnicos de soporte más cercanos...</li>';
        contenedor.style.display = 'block';
        
        fetch(`/api/admin/tecnicos/mas_cercano?lat=${lat}&lon=${lon}`)
            .then(res => res.json())
            .then(data => {
                lista.innerHTML = '';
                if (data.status === 'ok') {
                    if (data.recomendados.length === 0) {
                        lista.innerHTML = '<li style="color: #c2410c;"><i class="fa-solid fa-triangle-exclamation"></i> No hay técnicos activos de soporte con señal GPS hoy.</li>';
                    } else {
                        data.recomendados.forEach(tec => {
                            const li = document.createElement('li');
                            li.style.display = 'flex';
                            li.style.justifyContent = 'space-between';
                            li.style.alignItems = 'center';
                            li.style.width = '100%';
                            li.innerHTML = `
                                <span>
                                    <strong>${tec.nombre}</strong> (a ${tec.distancia_km} km) 
                                    <span style="font-size: 0.75rem; color: #15803d; background: #dcfce7; padding: 2px 6px; border-radius: 4px; font-weight: bold; margin-left: 5px;">${tec.estado}</span>
                                </span>
                                <button type="button" onclick="seleccionarTecnicoRecomendado('${tec.nombre}')" 
                                    style="background-color: #166534; color: white; border: none; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: background 0.2s;">
                                    Asignar
                                </button>
                            `;
                            lista.appendChild(li);
                        });
                    }
                } else {
                    lista.innerHTML = `<li style="color: #b91c1c;">Error: ${data.message}</li>`;
                }
            })
            .catch(err => {
                console.error(err);
                lista.innerHTML = '<li style="color: #b91c1c;">Error de conexión con el servidor.</li>';
            });
    }

    function seleccionarTecnicoRecomendado(nombre) {
        const selectTec = document.getElementById('registro-tecnico-asignado');
        if (selectTec) {
            selectTec.value = nombre;
            // Mostrar una alerta sutil o confirmación visual
            const contenedor = document.getElementById('contenedor-recomendaciones-tecnicos');
            contenedor.style.backgroundColor = '#dcfce7'; // Cambiar a verde de éxito temporalmente
            setTimeout(() => {
                contenedor.style.display = 'none';
                contenedor.style.backgroundColor = '#f0fdf4'; // Restaurar color original
            }, 800);
        }
    }
</script>
